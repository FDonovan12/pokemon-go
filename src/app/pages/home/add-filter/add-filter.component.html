<button
    (click)="openAddFilterPopup()"
    style="margin-top: 15px"
>
    ➕ Ajouter un filtre
</button>

@if (showAddFilterPopup()) {
    <div
        style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        "
    >
        <div style="background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); width: 400px">
            <h2>Ajouter un nouveau filtre</h2>

            <div style="margin-bottom: 15px">
                <label>Libellé du filtre:</label>
                <input
                    type="text"
                    [(ngModel)]="newFilterLabel"
                    placeholder="ex: Mon filtre perso"
                    style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box"
                />
            </div>

            <div style="margin-bottom: 20px">
                <label>Requête du filtre:</label>
                <textarea
                    [(ngModel)]="newFilterQuery"
                    placeholder="ex: 2-attaque, -1défense"
                    style="
                        width: 100%;
                        padding: 8px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        box-sizing: border-box;
                        min-height: 100px;
                        font-family: monospace;
                    "
                ></textarea>
            </div>

            <div style="margin-bottom: 15px; padding: 10px; background-color: #f5f5f5; border-radius: 4px">
                <div style="margin-bottom: 10px">
                    <label>Listes à inclure:</label>
                    <div style="
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        padding: 8px;
                        max-height: 150px;
                        overflow-y: auto;
                        background-color: white;
                    ">
                        @if (availableLists().length === 0) {
                            <p style="color: #999; margin: 0">Aucune liste disponible</p>
                        } @else {
                            @for (listKey of availableLists(); track listKey) {
                                <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer">
                                    <input
                                        type="checkbox"
                                        [checked]="selectedLists().includes(listKey)"
                                        (change)="
                                            $event.target.checked
                                                ? selectedLists.set([...selectedLists(), listKey])
                                                : selectedLists.set(selectedLists().filter((l) => l !== listKey))
                                        "
                                        style="cursor: pointer"
                                    />
                                    {{ listKey }}
                                </label>
                            }
                        }
                    </div>
                </div>

                <div style="margin-top: 10px">
                    <label style="display: block; margin-bottom: 8px">Opérateur:</label>
                    <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 5px; cursor: pointer">
                        <input
                            type="radio"
                            name="operator"
                            value="AND"
                            [(ngModel)]="listOperator"
                            style="cursor: pointer"
                        />
                        ET (AND) - toutes les listes doivent correspondre
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer">
                        <input
                            type="radio"
                            name="operator"
                            value="OR"
                            [(ngModel)]="listOperator"
                            style="cursor: pointer"
                        />
                        OU (OR) - au moins une liste doit correspondre
                    </label>
                </div>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end">
                <button
                    (click)="closeAddFilterPopup()"
                    style="padding: 8px 16px; background-color: #f0f0f0; border: 1px solid #ccc; border-radius: 4px; cursor: pointer"
                >
                    Annuler
                </button>
                <button
                    (click)="addNewFilter()"
                    style="padding: 8px 16px; background-color: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer"
                >
                    Ajouter
                </button>
            </div>
        </div>
    </div>
}
