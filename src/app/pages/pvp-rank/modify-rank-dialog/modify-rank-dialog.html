<div
    class="dialog-backdrop"
    (click)="cancelled.emit()"
>
    <form
        class="dialog"
        (click)="$event.stopPropagation()"
        (ngSubmit)="confirm()"
    >
        <h3>Modifier le Rank</h3>
        <app-image-pokemon
            [pokemon]="pokemon()"
            [height]="100"
        ></app-image-pokemon>
        <label>
            Rank (1-4096):
            <input
                #rankInput
                type="number"
                [formField]="rankForm.rank"
            />
        </label>

        <label>
            Ligue:
            <select [formField]="rankForm.league">
                <option value="super">Super</option>
                <option value="hyper">Hyper</option>
            </select>
        </label>

        <label>
            Forme:
            <select [formField]="rankForm.forme">
                <option value="normal">Normal</option>
                <option value="obscur">Obscur</option>
            </select>
        </label>

        <div class="buttons">
            <button
                type="submit"
                [disabled]="rankForm().invalid()"
            >
                Confirmer
            </button>
            <button
                type="button"
                (click)="cancelled.emit()"
            >
                Annuler
            </button>
        </div>
    </form>
</div>
