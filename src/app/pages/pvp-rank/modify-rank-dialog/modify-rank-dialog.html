<div
    class="dialog-backdrop"
    (click)="cancelled.emit()"
>
    <form
        class="dialog"
        (click)="$event.stopPropagation()"
        (ngSubmit)="confirm()"
    >
        <h3>Modifier le Rank</h3>

        <label>
            Rank (1-4096):
            <input
                #rankInput
                type="number"
                [value]="rank()"
                (input)="rank.set(rankInput.valueAsNumber)"
                min="1"
                max="4096"
            />
        </label>

        <label>
            Ligue:
            <select
                [value]="league()"
                (change)="league.set($any($event.target).value)"
            >
                <option value="super">Super</option>
                <option value="hyper">Hyper</option>
            </select>
        </label>

        <label>
            Forme:
            <select
                [value]="form()"
                (change)="form.set($any($event.target).value)"
            >
                <option value="normal">Normal</option>
                <option value="obscur">Obscur</option>
            </select>
        </label>

        <div class="buttons">
            <button
                type="submit"
                [disabled]="rank() < 1 || rank() > 4096 || !rank()"
            >
                Confirmer
            </button>
            <button
                type="button"
                (click)="cancelled.emit()"
            >
                Annuler
            </button>
        </div>
    </form>
</div>
